name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Scan only the shipped library source. Tests and examples are illustrative and not published.
          config: |
            paths:
              - src
            paths-ignore:
              - "**/*.test.ts"
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
